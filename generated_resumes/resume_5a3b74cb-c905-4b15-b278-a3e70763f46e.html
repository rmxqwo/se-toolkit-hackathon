
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>asa - Resume</title>
        <style>
            body {
                font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
                margin: 0;
                padding: 40px;
                background: #f0f2f5;
            }
            .resume {
                max-width: 900px;
                margin: 0 auto;
                background: white;
                border-radius: 12px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                overflow: hidden;
            }
            .resume-header {
                background: linear-gradient(135deg, #2563eb, #1d4ed8);
                color: white;
                padding: 40px;
                text-align: center;
            }
            .resume-header h1 {
                margin: 0 0 10px 0;
                font-size: 2.5rem;
            }
            .resume-header .title {
                font-size: 1.2rem;
                opacity: 0.9;
                margin-bottom: 20px;
            }
            .contact-info {
                display: flex;
                justify-content: center;
                gap: 20px;
                flex-wrap: wrap;
                font-size: 0.9rem;
            }
            .contact-info a {
                color: white;
                text-decoration: none;
            }
            .resume-body {
                padding: 40px;
            }
            .section {
                margin-bottom: 30px;
            }
            .section h2 {
                color: #2563eb;
                border-bottom: 2px solid #e2e8f0;
                padding-bottom: 10px;
                margin-bottom: 20px;
            }
            .skills {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
            }
            .skill-item {
                background: #e0e7ff;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 0.9rem;
            }
            .skill-level, .skill-category {
                font-size: 0.8rem;
                opacity: 0.7;
                margin-left: 8px;
            }
            .experience-item, .education-item {
                margin-bottom: 25px;
            }
            .exp-header, .edu-header {
                font-size: 1.1rem;
                margin-bottom: 5px;
            }
            .exp-date, .edu-date {
                float: right;
                color: #64748b;
                font-size: 0.9rem;
            }
            .exp-location, .edu-institution {
                color: #64748b;
                font-size: 0.9rem;
                margin-bottom: 10px;
            }
            .exp-achievements {
                margin-top: 10px;
                padding-left: 20px;
                color: #475569;
            }
            .summary {
                background: #f8fafc;
                padding: 20px;
                border-radius: 8px;
                line-height: 1.6;
            }
            @media (max-width: 600px) {
                body { padding: 20px; }
                .resume-header { padding: 20px; }
                .resume-body { padding: 20px; }
                .exp-date { float: none; display: block; margin-top: 5px; }
            }
        </style>
    </head>
    <body>
        <div class="resume">
            <div class="resume-header">
                <h1>aas </h1>
                <div class="title">asa</div>
                <div class="contact-info">
                    <span>📧 sas</span>
                    
                    
                </div>
                <div class="contact-info">
                    
                    
                    
                </div>
            </div>
            <div class="resume-body">
                
                <div class="section">
                    <h2>Professional Summary</h2>
                    <div class="summary">Student</div>
                </div>
                
                
                
                <div class="section">
                    <h2>Skills</h2>
                    <div class="skills">
        <div class="skill-item">
            <strong>Python</strong>
            
            
        </div>
        </div>

                <div class="section">
                    <h2>Education</h2>
                    
        <div class="education-item">
            <div class="edu-header">
                <strong></strong> in None
                <span class="edu-date"></span>
            </div>
            <div class="edu-institution">Innopolis University</div>
            
        </div>

        </div>
    </body>
    </html>
